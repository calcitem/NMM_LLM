model:
  backbone_hidden: [256, 256, 128]
  head_hidden: [64]
  dropout: 0.1

training:
  algorithm: reinforce      # reinforce | ppo
  lr: 0.0003
  gamma: 0.99
  episodes_per_batch: 32
  max_episodes: 220010        # must be >= sum of all stage budgets
  checkpoint_every: 1000
  eval_every: 500
  eval_games: 50
  temperature: 1.0
  temperature_decay: 0.99995  # was 0.9995 — reaches 0.1 at ~46k ep, not 4.6k
  min_temperature: 0.15       # slightly higher floor keeps some exploration late
  value_coef: 0.5
  entropy_coef: 0.03          # was 0.01 — more entropy bonus encourages exploration
  ppo_clip: 0.2
  ppo_epochs: 4
  seed: 42

  # C: reward shaping — heuristic eval delta as intermediate signal.
  # Set shaping_scale: 0.0 to disable.  shaping_norm scales the tanh input
  # (typical midgame eval delta in heuristic units ≈ 200–800).
  shaping_scale: 0.1
  shaping_norm: 500.0

  # B: Stage 4 net+negamax settings.
  # stage4_difficulty=1 uses ~0.3s/move by default; override_time_budget cuts it to
  # stage4_time_budget_s for training speed.  Increase difficulty for stronger play
  # at the cost of slower episodes.
  stage4_difficulty: 1
  stage4_time_budget_s: 0.05   # seconds per move in Stage 4; 0.05 ≈ 50ms

curriculum:
  stage1_episodes: 10
  stage2_episodes: 30000      # safety cap; actual exit is win-rate gated
  stage3_episodes: 120000     # safety cap across all difficulty levels (10 levels × ~12k each)
  stage4_episodes: 70000      # self-play strength development
  stage5_episodes: 0

  # Stage 2: graduate to stage 3 only after hitting this rolling win rate vs random
  stage2_win_threshold: 0.60

  # Stage 3: blunder sub-levels before the full-strength difficulty ramp
  # Each rate is played at difficulty_start; model must hold threshold at each before bumping
  stage3_blunder_rates: [0.80, 0.60, 0.40, 0.20]  # 80%→60%→40%→20% blunder, then 0%

  # Stage 3: full-strength difficulty ramp after blunder levels clear
  stage3_difficulty_start: 1
  stage3_difficulty_max: 10   # must hold threshold at difficulty 10 to graduate to stage 4
  stage3_difficulty_threshold: 0.55

  # Rolling window size (episodes) used for all win-rate checks
  eval_window: 200

replay_buffer:
  capacity: 50000
  min_fill_before_train: 100

paths:
  checkpoint_dir: learned_ai/checkpoints
  log_dir: learned_ai/logs
  game_log_dir: learned_ai/self_play_games

opponents:
  use_heuristic_pool: true
  pool_checkpoint_every: 2000
  pool_max_size: 5
